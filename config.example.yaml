# OPTIONAL config file.
#
# Most people don't need this — manage your watches by chatting with the bot:
#   /add     create a watch (name, make, model, year, price, km, fuel)
#   /list    show your watches
#   /remove  delete one
#
# This file is only for power users who want to pin a raw gaspedaal search URL
# (e.g. with filters the /add wizard doesn't expose). These run alongside your
# bot-managed watches. Leave `searches` empty if you don't need it.
#
# To build a URL: set filters on https://www.gaspedaal.nl, add srt=df-a
# (newest first), and copy the address-bar URL.

searches: []
